<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">

    <title>Prise de poste / KSD</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js" defer></script>
    <script src="js/terminal.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/countdown.js" defer></script>
  </head>
  <body data-page="countdown">
    <div class="site-shell countdown-shell">
      <header class="topbar">
        <a class="brand" href="index.html">KALYCE SECURITY DIVISION</a>
        <nav class="main-nav" aria-label="Navigation principale">
          <a href="apply.html" data-nav="apply">Candidature</a>
          <a href="cameras.html" data-nav="cameras" data-camera-link>Cam&eacute;ras</a>

        <button class="audio-toggle" type="button" data-audio-toggle>ACTIVER L'AUDIO</button>

      <main class="countdown-stage">
        <section class="countdown-block" data-countdown-page>
          <div class="system-label">AFFECTATION PROGRAMM&Eacute;E / SYNCHRONISATION</div>
          <h1>PRISE DE POSTE DANS :</h1>
          <div class="countdown-units" data-countdown-units>

            <span><strong data-hours>--</strong> heures</span>
            <span><strong data-minutes>--</strong> minutes</span>
            <span><strong data-seconds>--</strong> secondes</span>
          </div>
          <p data-countdown-end hidden>Le service commence maintenant.</p>
          <a class="button primary" href="final.html" data-night-button hidden>COMMENCER LA NUIT</a>
        </section>
      </main>

      <footer class="site-footer">
        <span>KSD intranet build <span data-build-number>--</span></span>
        <button type="button" class="footer-link" data-open-terminal>maintenance</button>
      </footer>
    </div>
  </body>
</html>
